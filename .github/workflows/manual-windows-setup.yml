name: Manual Windows Setup Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-setup:
    name: Build Windows Setup.exe
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater signing requirement for manual build
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle=j.bundle||{};j.bundle.createUpdaterArtifacts=false;fs.writeFileSync(p,JSON.stringify(j,null,2));"

      - name: Build NSIS setup
        run: pnpm tauri build --bundles nsis

      - name: Collect setup artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null

          $setup = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis' -Recurse -File -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $setup) {
            $setup = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -File -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $setup) {
            throw 'No NSIS Setup.exe found'
          }

          $appVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $dest = "启航-AI-编程助手-v$appVersion-Windows-Setup.exe"
          Copy-Item $setup.FullName (Join-Path dist-artifacts $dest)
          Write-Host "Setup copied: $dest"

          $sigPath = "$($setup.FullName).sig"
          if (Test-Path $sigPath) {
            Copy-Item $sigPath (Join-Path dist-artifacts ("$dest.sig"))
            Write-Host "Signature copied: $dest.sig"
          } else {
            Write-Host "No signature found for setup (optional)"
          }

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-${{ github.run_number }}
          path: dist-artifacts/*
          if-no-files-found: error
