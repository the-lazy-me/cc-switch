name: Multi Platform Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            gui_cmd: pnpm tauri build --bundles app
          - name: Windows
            os: windows-2022
            gui_cmd: pnpm tauri build --bundles msi,nsis
          - name: Linux
            os: ubuntu-22.04
            gui_cmd: pnpm tauri build --bundles appimage,deb,rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater signing requirement for CI artifacts
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.bundle=j.bundle||{};j.bundle.createUpdaterArtifacts=false;fs.writeFileSync(p,JSON.stringify(j,null,2));"

      - name: Build no-UI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --features custom-protocol

      - name: Build UI packages
        run: ${{ matrix.gui_cmd }}

      - name: Collect artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist-artifacts/no-ui dist-artifacts/ui
          cp src-tauri/target/release/qihang-ai-coding-assistant dist-artifacts/no-ui/
          find src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" -o -name "*.tar.gz" \) -exec cp {} dist-artifacts/ui/ \; || true
          find src-tauri/target/release/bundle -type d -name "*.app" -exec cp -R {} dist-artifacts/ui/ \; || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts/no-ui | Out-Null
          New-Item -ItemType Directory -Force -Path dist-artifacts/ui | Out-Null
          Copy-Item src-tauri/target/release/qihang-ai-coding-assistant.exe dist-artifacts/no-ui/
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File -Include *.msi,*.exe,*.zip | ForEach-Object {
            Copy-Item $_.FullName dist-artifacts/ui/
          }

      - name: Upload no-UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-ui-${{ matrix.name }}-${{ github.run_number }}
          path: dist-artifacts/no-ui/
          if-no-files-found: error

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.name }}-${{ github.run_number }}
          path: dist-artifacts/ui/
          if-no-files-found: error
